name = "better-chatbot-worker"
main = "./entry.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

[assets]
binding = "ASSETS"
directory = "./dist"
not_found_handling = "single-page-application"

[ai]
binding = "AI"

[images]
binding = "IMAGES"

[[kv_namespaces]]
binding = "KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
# Create via: wrangler kv namespace create KV
# Then replace the id above with the output namespace ID

[[durable_objects.bindings]]
name = "AGENT"
class_name = "ChatAgent"

[[migrations]]
tag = "v1"
new_classes = ["ChatAgent"]

[observability]
enabled = true

[vars]
AI_GATEWAY_ID = "default-gateway"
# CF_ACCOUNT_ID and CF_IMAGES_TOKEN should be set as secrets via:
#   wrangler secret put CF_ACCOUNT_ID
#   wrangler secret put CF_IMAGES_TOKEN
